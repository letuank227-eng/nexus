services:
  - type: web
    name: nexus
    env: node
    region: singapore  # Gần Việt Nam nhất
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false  # Bạn điền thủ công sau khi có URL
      - key: GROQ_API_KEY
        sync: false  # Bạn điền thủ công
      - key: GEMINI_API_KEY
        sync: false  # Bạn điền thủ công

databases:
  - name: nexus-db
    databaseName: nexus
    user: nexus_user
    plan: free
    region: singapore
